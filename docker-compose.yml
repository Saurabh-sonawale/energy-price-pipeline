version: "3.9"

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka:
    image: confluentinc/cp-kafka:7.7.1
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 12

  topic-init:
    image: confluentinc/cp-kafka:7.7.1
    depends_on:
      kafka:
        condition: service_healthy
    command: >
      bash -c "
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic weather-data --partitions 3 --replication-factor 1 &&
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic energy-prices --partitions 3 --replication-factor 1 &&
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic processed-data --partitions 3 --replication-factor 1 &&
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic trading-signals --partitions 3 --replication-factor 1 &&
      kafka-topics --bootstrap-server kafka:29092 --list"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: energy_pipeline
      POSTGRES_USER: energy_user
      POSTGRES_PASSWORD: energy_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U energy_user -d energy_pipeline"]
      interval: 10s
      timeout: 5s
      retries: 10

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.19.0
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:///mlflow.db --default-artifact-root /mlruns
    ports:
      - "5000:5000"
    volumes:
      - mlruns:/mlruns

  weather-producer:
    build: .
    env_file: .env
    depends_on:
      kafka:
        condition: service_healthy
      topic-init:
        condition: service_completed_successfully
    command: python -m ingestion.run_weather_producer
    restart: unless-stopped

  energy-producer:
    build: .
    env_file: .env
    depends_on:
      kafka:
        condition: service_healthy
      topic-init:
        condition: service_completed_successfully
    command: python -m ingestion.run_energy_producer
    restart: unless-stopped

  stream-processor:
    build: .
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      topic-init:
        condition: service_completed_successfully
    command: python -m processing.stream_processor
    restart: unless-stopped
    volumes:
      - artifacts:/app/artifacts

  prediction-service:
    build: .
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    command: python -m models.prediction_service
    restart: unless-stopped
    volumes:
      - artifacts:/app/artifacts

  model-trainer:
    build: .
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      mlflow:
        condition: service_started
    command: python -m models.train_prophet
    profiles: ["batch"]
    volumes:
      - artifacts:/app/artifacts

  dashboard-export:
    build: .
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    command: python -m dashboard.export_csv
    profiles: ["batch"]
    volumes:
      - ./data:/app/data

volumes:
  pgdata:
  mlruns:
  artifacts:
