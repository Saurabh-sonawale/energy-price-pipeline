name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lightweight test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy pytest requests pydantic pydantic-settings scikit-learn SQLAlchemy psycopg2-binary confluent-kafka joblib

      - name: Run tests
        run: pytest -q
